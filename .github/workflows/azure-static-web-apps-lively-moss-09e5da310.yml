# Deploy static HTML site to Azure Static Web Apps
# Docs: https://docs.github.com/en/actions/how-tos/deploy/deploy-to-third-party-platforms/azure-static-web-app
#
# One-time setup:
# 1. Create an Azure Static Web App (deployment source: Other / GitHub as you prefer)
# 2. Copy the deployment token from Azure → Manage deployment token
# 3. Add a GitHub Actions secret named AZURE_STATIC_WEB_APPS_API_TOKEN with that value
#    https://learn.microsoft.com/azure/static-web-apps/deployment-token-management

name: Deploy web app to Azure Static Web Apps

env:
  APP_LOCATION: "/"       # site root (index.html, css/, images/, etc.)
  API_LOCATION: ""        # no Azure Functions API in this repo
  OUTPUT_LOCATION: ""     # no build output folder (static HTML)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
